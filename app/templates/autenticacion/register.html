{% extends "base.html" %}
{% block title %}Crear Cuenta · SGPT{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">◆</span>
            <h1>SGPT</h1>
            <p class="auth-subtitle">Crea tu cuenta y empieza a organizar</p>
        </div>

        <form method="POST" action="{{ url_for('autenticacion.register') }}" class="auth-form">
            <div class="form-group">
                <label for="name">Nombre completo</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="name" name="name" required
                           placeholder="Tu nombre" minlength="2" maxlength="100" autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input type="email" id="email" name="email" required
                           placeholder="tu@correo.com" autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" name="password" required
                           placeholder="Mínimo 6 caracteres" minlength="6" autocomplete="new-password">
                    <button type="button" class="toggle-password" onclick="
                        const p = document.getElementById('password');
                        p.type = p.type === 'password' ? 'text' : 'password';
                    " aria-label="Mostrar/ocultar contraseña">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="register-btn">
                Crear Cuenta
            </button>
        </form>

        <div class="auth-footer">
            <p>¿Ya tienes cuenta? <a href="{{ url_for('autenticacion.login') }}">Inicia sesión</a></p>
        </div>
    </div>
</div>
{% endblock %}
